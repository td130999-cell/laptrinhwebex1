<!DOCTYPE html>
<html>

<head>

    <title>view</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   
</head>

<body>
    <div class="container mt-3 p-2 my-5 bg-dark text-white" style="text-align: center;">

       <ul class="nav justify-content-center">
            <li class="nav-item">
                <a class="nav-link" style="color: white;">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" style="color: white;">Đăng nhập</a>
            </li>
            <li class="nav-item" >
                <a class="nav-link" style="color: aqua;">Đăng ký</a>
            </li>

        </ul>
    </div>
    <div class="container" style="display: flex; justify-content: center; padding-top: 50px;">
        <div id="loginbox" class="col-md-6 col-sm-8" style="border: 2px solid black ;">
            <div class="panel panel-info">
                <div class="panel-heading">
                    <div class="panel-title text-center mt-3">
                        <h3>Màn hình chi tiết</h3>
                    </div>
                </div>

                <div style="padding: 30px" class="panel-body">
                    <form method="post" class="form-horizontal">
                        <div class="input-group" style="margin-bottom: 20px">
                            <span class="input-group-addon"><i class="glyphicon glyphicon-user"
                                    style="margin-right: 20px;">Username</i></span>
                            <input id="login-username" type="text" class="form-control" placeholder="test1" name="username">
                        </div>

                        <div class="input-group" style="margin-bottom: 20px">
                            <span class="input-group-addon"><i class="glyphicon glyphicon-lock"
                                    style="margin-right: 50px;">Email</i></span>
                            <input id="login-email" type="email" placeholder="test1@gmail.com" class="form-control">
                        </div>
                     
                        <div class="d-flex justify-content-end">

                            <a  href="#" class="btn btn-primary">Chỉnh sửa</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <footer>
        <div class="container mt-3 p-3 my-5 bg-dark text-white" style="text-align: center;">
            <span>Lập trình backend wed 2</span>
        </div>
    </footer>

</body>

</html>
